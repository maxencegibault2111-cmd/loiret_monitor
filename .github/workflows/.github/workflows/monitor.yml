name: Monitor Loiret

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests beautifulsoup4 lxml

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: arrete_state.json
          key: loiret-state-${{ github.run_id }}
          restore-keys: loiret-state-

      - name: Run monitor
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python monitor_loiret.py

      - name: Save state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: arrete_state.json
          key: loiret-state-${{ github.run_id }}
